<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    

    <title>Cart | MRA Stationery</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->

    <header>

        <div class="logo">

            <img src="logo.png"
                 alt="MRA Logo">

            <div class="logo-text">
                <p>STATIONERY AND GIFTS</p>
            </div>

        </div>

        <nav>

            <a href="index.html">Home</a>

            <a href="product.html">Products</a>

            <a href="cart.html">Cart</a>

            <a href="contact.html">Contact</a>

            <a href="profile.html"
               class="profile-icon">

                <img src="loidn.PNG"
                     alt="Profile">

            </a>

        </nav>

    </header>

    <!-- CART PAGE -->

    <div class="cart-page">

        <h1>YOUR ORDER</h1>

        <!-- PRODUCTS -->

        <div class="cart-section">

            <h2>Products</h2>

            <div id="cartItems">

                No Products Added

            </div>

        </div>

        <!-- PRICE DETAILS -->

        <div class="price-box">

            <h2>Price Details</h2>

            <div class="price-row">

                <span>Product Total</span>

                <span>
                    ₹<span id="productTotal">0</span>
                </span>

            </div>

            <div class="price-row">

                <span>Packing & Courier</span>

                <span>₹80</span>

            </div>

            <hr>

            <div class="grand-row">

                <span>Grand Total</span>

                <span>
                    ₹<span id="grandTotal">0</span>
                </span>

            </div>

        </div>

        <!-- CHECKOUT BUTTON -->

        <button
            id="placeOrderBtn"
            class="checkout-btn">

        PROCEED TO CHECKOUT

        </button>

    </div>

    <script type="module"
            src="cart-page.js"></script>

</body>
</html>
